; PlatformIO Project Configuration File

[platformio]
default_envs = eolo_express
extra_configs = platformio.demos.ini

; Base de los firmwares ESP32. Los perfiles que no redefinen lib_deps heredan
; esta lista completa; no sustituirla con listas parciales por entorno.
[embedded]
platform = espressif32@6.10.0
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
lib_deps =
	adafruit/Adafruit Unified Sensor@^1.1.15
	adafruit/Adafruit BME280 Library@^2.3.0
	olikraus/U8g2@^2.36.14
	sparkfun/SparkFun_FS3000_Arduino_Library@^1.0.5
	adafruit/RTClib@^2.1.4
	4-20ma/ModbusMaster@^2.0.1
	plerup/EspSoftwareSerial@^8.2.0
	vshymanskyy/TinyGSM@^0.12.0
	bblanchon/ArduinoJson@^6.20.0
lib_ldf_mode = deep+
test_ignore = test_eolo_core_native
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio
upload_speed = 921600
board_build.partitions = min_spiffs.csv
extra_scripts =
	scripts/platformio_sync_time.py
	post:scripts/platformio_config_info.py
build_unflags =
	-std=gnu++11
build_flags =
	-std=gnu++17
	-DCORE_DEBUG_LEVEL=3
	-DCONFIG_ARDUHAL_LOG_COLORS=1
	-DPROFILE_ENABLED=1
	-DPROFILE_VERBOSE=0

[env:eolo_express]
extends = embedded
build_flags =
	${embedded.build_flags}
	-DEOLO_TARGET_EXPRESS
	-DFEATURE_MOTOR_PWM
	-DFEATURE_FLOW_AFM07
	-DFEATURE_FLOW_CALIBRATION
	-DFEATURE_PLANTOWER

[env:eolo_express_legacy]
extends = embedded
build_flags =
	${embedded.build_flags}
	-DEOLO_TARGET_EXPRESS_LEGACY
	-DFEATURE_MOTOR_PWM
	-DFEATURE_FLOW_FS3000
	-DFEATURE_FLOW_CALIBRATION
	-DFEATURE_PLANTOWER

[env:eolo_standard]
extends = embedded
build_flags =
	${embedded.build_flags}
	-DEOLO_TARGET_STANDARD
	-DFEATURE_MOTOR_PWM
	-DFEATURE_MODEM
	-DFEATURE_ANEMOMETER
	-DFEATURE_DUAL_BATTERY
	-DFEATURE_FLOW_AFM07
	-DFEATURE_FLOW_CALIBRATION
	-DFEATURE_PLANTOWER

[env:eolo_dron]
extends = embedded
extra_scripts =
	${embedded.extra_scripts}
	pre:scripts/generate_headless_setup_web.py
lib_ignore = U8g2
lib_deps =
	${embedded.lib_deps}
	adafruit/Adafruit NeoPixel@^1.12.5
build_flags =
	${embedded.build_flags}
	-DEOLO_TARGET_DRON
	-DFEATURE_HEADLESS
	-DFEATURE_MOTOR_PWM_POWER_PIN
	-DFEATURE_FLOW_AFM07
	-DFEATURE_FLOW_PID
	-DFEATURE_NEOPIXEL
	-DFEATURE_NTC
	-DDRONE_SWITCHES_HAVE_EXTERNAL_PULLS

[env:eolo_dron_low_power]
extends = env:eolo_dron
build_flags =
	${env:eolo_dron.build_flags}
	-DSTATUS_LED_LOW_POWER

[env:native]
platform = native
test_framework = unity
test_filter = test_eolo_core_native
build_flags =
	-std=gnu++17
	-Iinclude
